      <h1>企业碳核算工作台</h1>
      <p>按企业查看已识别的标准、核算方法、数据类型、核查环节、活动类别、Scope 数值候选与 Scope 3 类别数值候选，并保留报告文件名、页码、原文片段、识别依据、置信度和校核状态。</p>
      <p>输入企业名称或世界500强企业编号后，可直接下钻到该企业的碳排放计算依据页面。结构化绝对量与原文数值候选分开呈现，便于后续人工复核与计算入库。</p>
      <div class="actions workbench-toolbar">
        <label class="entity-search workbench-search">

          <input id="company-workbench-search" type="search" list="company-workbench-options" placeholder="输入企业名称或 company_id">
          <datalist id="company-workbench-options"></datalist>
        </label>
        <button class="btn" id="company-workbench-open" type="button">打开企业工作台</button>
        <a class="btn alt" href="./index.html">返回中文首页</a>
      </div>
    </section>
